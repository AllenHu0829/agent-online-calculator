<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Online Calculator</title>
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <div class="app">
    <div class="calculator">
      <h1>Online Calculator</h1>
      <div class="display">
        <div class="display-expression" id="expression"></div>
        <div class="display-result" id="result">0</div>
      </div>
      <div class="buttons">
        <button class="btn btn-func" data-op="C">AC</button>
        <button class="btn btn-func" data-op="back">&#9003;</button>
        <button class="btn btn-func" data-op="%">%</button>
        <button class="btn btn-op" data-op="/">÷</button>

        <button class="btn btn-num" data-op="7">7</button>
        <button class="btn btn-num" data-op="8">8</button>
        <button class="btn btn-num" data-op="9">9</button>
        <button class="btn btn-op" data-op="*">×</button>

        <button class="btn btn-num" data-op="4">4</button>
        <button class="btn btn-num" data-op="5">5</button>
        <button class="btn btn-num" data-op="6">6</button>
        <button class="btn btn-op" data-op="-">−</button>

        <button class="btn btn-num" data-op="1">1</button>
        <button class="btn btn-num" data-op="2">2</button>
        <button class="btn btn-num" data-op="3">3</button>
        <button class="btn btn-op" data-op="+">+</button>

        <button class="btn btn-func" data-op="negate">+/−</button>
        <button class="btn btn-num" data-op="0">0</button>
        <button class="btn btn-num" data-op=".">.</button>
        <button class="btn btn-eq" data-op="=">=</button>
      </div>
    </div>

    <div class="history">
      <h2>History</h2>
      <ul class="history-list" id="historyList">
        <li class="history-empty" id="historyEmpty">No calculations yet</li>
      </ul>
      <button class="history-clear" id="historyClear">Clear History</button>
    </div>
  </div>

  <script src="calculator.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
